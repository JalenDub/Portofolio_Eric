<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Agent | Eric Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/eric.css') }}">
    
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--val-black);
            position: relative;
            padding: 20px;
        }

        .login-bg-decor {
            position: absolute;
            font-family: var(--font-heading);
            font-size: 20vw;
            color: rgba(29, 82, 237, 0.03);
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--val-dark-gray);
            border: 1px solid rgba(236, 232, 225, 0.1);
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 25px;
            height: 25px;
            background-color: var(--val-red);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-title {
            font-family: var(--font-heading);
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--val-cream);
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--val-red);
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-danger {
            background-color: rgba(255, 70, 85, 0.15);
            border: 1px solid var(--val-red);
            color: #ff8892;
        }

        .alert-warning {
            background-color: rgba(240, 173, 78, 0.15);
            border: 1px solid #f0ad4e;
            color: #ffd085;
        }

        .alert-info {
            background-color: rgba(236, 232, 225, 0.1);
            border: 1px solid var(--val-cream);
            color: var(--val-cream);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-family: var(--font-heading);
            font-size: 13px;
            color: var(--val-gray);
            text-decoration: none;
            letter-spacing: 1px;
            transition: var(--transition-fast);
        }

        .back-link:hover {
            color: var(--val-red);
        }
    </style>
</head>
<body class="yoru-mode">

    <div class="top-accent-bar"></div>

    <div class="login-wrapper">
        <div class="login-bg-decor">SECURE</div>
        
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">// AUTENTIKASI AGENT</h1>
                <p class="login-subtitle">SECURE TERMINAL ACCESS</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <span>//</span> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="eric-form" method="POST" action="{{ url_for('utama.login') }}">
                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-sharp btn-block">MASUK TERMINAL</button>
            </form>
            
            <a href="{{ url_for('utama.index') }}" class="back-link">&larr; KEMBALI KE PORTFOLIO</a>
        </div>
    </div>

</body>
</html>
